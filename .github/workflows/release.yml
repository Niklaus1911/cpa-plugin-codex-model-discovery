name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26.x"
          cache: true
      - run: go test ./...
      - run: go test -race ./...
      - run: go vet ./...

  linux:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26.x"
          cache: true
      - name: Build and package
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p build dist
          CGO_ENABLED=1 GOOS=linux GOARCH="${{ matrix.goarch }}" go build -trimpath -buildmode=c-shared -ldflags="-s -w -X main.version=${version}" -o build/codex-model-discovery.so .
          zip -j "dist/codex-model-discovery_${version}_linux_${{ matrix.goarch }}.zip" build/codex-model-discovery.so
      - uses: actions/upload-artifact@v7
        with:
          name: release-linux-${{ matrix.goarch }}
          path: dist/*.zip
          if-no-files-found: error

  windows:
    needs: test
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26.x"
          cache: true
      - id: msys2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: mingw-w64-x86_64-gcc
      - name: Build
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart('v')
          $env:CGO_ENABLED = '1'
          $env:GOOS = 'windows'
          $env:GOARCH = 'amd64'
          $env:CC = Join-Path '${{ steps.msys2.outputs.msys2-location }}' 'mingw64\bin\gcc.exe'
          New-Item -ItemType Directory -Force -Path build, dist | Out-Null
          go build -trimpath -buildmode=c-shared -ldflags="-s -w -X main.version=$version" -o build/codex-model-discovery.dll .
      - name: Package
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart('v')
          Compress-Archive -Path build/codex-model-discovery.dll -DestinationPath "dist/codex-model-discovery_${version}_windows_amd64.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: release-windows-amd64
          path: dist/*.zip
          if-no-files-found: error

  macos:
    needs: test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26.x"
          cache: true
      - name: Build and package
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p build dist
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 go build -trimpath -buildmode=c-shared -ldflags="-s -w -X main.version=${version}" -o build/codex-model-discovery.dylib .
          zip -j "dist/codex-model-discovery_${version}_darwin_arm64.zip" build/codex-model-discovery.dylib
      - uses: actions/upload-artifact@v7
        with:
          name: release-darwin-arm64
          path: dist/*.zip
          if-no-files-found: error

  publish:
    needs:
      - linux
      - windows
      - macos
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Verify archives and create checksums
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          for archive in dist/*.zip; do
            unzip -t "$archive"
          done
          (cd dist && sha256sum ./*.zip > checksums.txt)
          test "$(find dist -maxdepth 1 -name "codex-model-discovery_${version}_*.zip" | wc -l)" -eq 4
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/*.zip dist/checksums.txt --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
