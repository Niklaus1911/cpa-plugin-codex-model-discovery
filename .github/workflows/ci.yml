name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26.x"
          cache: true
      - name: Check formatting
        run: |
          gofmt -w .
          git diff --exit-code
      - name: Test
        run: go test ./...
      - name: Race test
        run: go test -race ./...
      - name: Vet
        run: go vet ./...
      - name: Verify shared library build
        run: CGO_ENABLED=1 go build -trimpath -buildmode=c-shared -o /tmp/codex-model-discovery.so .
